appId: com.ledger.app
productName: Ledger
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!{.eslintcache,eslint.config.mjs,.prettierrc.yaml,.prettierignore,.editorconfig}'
  - '!{.env,.env.*,.npmrc}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json,drizzle.config.ts,electron.vite.config.ts}'
  - '!{SPEC.md,ARCHITECTURE.md,ROADMAP.md,docs}'
  - '!tests'
# Native better-sqlite3 cannot run from inside app.asar — keep it unpacked (ADR-003/004).
asarUnpack:
  - resources/**
  - '**/node_modules/better-sqlite3/**'
# Bundle Drizzle migrations so migrate() can find them at process.resourcesPath/drizzle.
extraResources:
  - from: drizzle
    to: drizzle
win:
  target: nsis
# Auto-update feed (P2-1, ADR-042). electron-builder emits latest.yml alongside the installer, and
# `--publish always` (the CI release job) uploads them to the GitHub Release for the pushed tag.
# electron-updater reads latest.yml from the repo's PUBLIC Releases (no auth). Owner/repo must match the
# real GitHub repo exactly.
publish:
  provider: github
  owner: NicholasHoedl
  repo: Ledger
