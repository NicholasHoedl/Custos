name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest # target-OS fidelity: Ledger ships Windows-only
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # postinstall runs `electron-builder install-app-deps`, compiling better-sqlite3 for the
      # Electron ABI (VS Build Tools + Python are preinstalled on windows-latest).
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      # ELECTRON_RUN_AS_NODE=1 boots electron as plain Node — headless-safe, no display needed.
      - run: npm test
